name: nwsviz
title: NWSViz EDR Service Profile
version: "1.0"
server_url: https://edr-api-desi-c.mdl.nws.noaa.gov

processes:
  - id: edr-zarr-difference
    title: EDR Zarr Dataset Difference
    description: Retrieves two Zarr datasets from an OGC API - EDR and calculates their difference.
    output_content:
      application/zip:
        schema:
          type: object

  - id: edr-zarr-difference-streaming
    title: EDR Zarr Dataset Difference Streaming
    description: Retrieves two Zarr datasets from an OGC API - EDR and streams their difference via a virtual Zarr endpoint.
    output_content:
      application/json:
        schema:
          type: object
          properties:
            zarr_endpoint:
              type: string

  - id: edr-zarr-wind-streaming
    title: EDR Zarr Wind Streaming
    description: Derives wind speed and direction from u/v component Zarr datasets and streams the result via a virtual Zarr endpoint.
    output_content:
      application/json:
        schema:
          type: object
          properties:
            zarr_endpoint:
              type: string

