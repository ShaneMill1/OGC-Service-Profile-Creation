name: nws_connect
title: NWS Connect Service Profile
version: "1.0"
server_url: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi

collections:
  - id: water_gauge
    title: Water Gauge Data
    description: Real-time GeoJSON notification messages for water gauge observations including flood stage information
    keywords:
      - water
      - gauge
      - notification
      - flood
      - USGS
      - real-time
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/water_gauge
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names:
      flood_stage:
        type: Parameter
        id: flood_stage
        description: Flood stage classification (major, moderate, minor, action, below_action, unknown)
        observedProperty:
          id: flood_stage
          label: Flood Stage
        unit:
          label: category
          symbol: category
      feet_above_stage:
        type: Parameter
        id: feet_above_stage
        description: Feet of observation above the observed flood stage
        observedProperty:
          id: feet_above_stage
          label: Feet Above Stage
        unit:
          label: feet
          symbol: ft
      value:
        type: Parameter
        id: value
        description: Water gauge observation value
        observedProperty:
          id: gauge_height
          label: Gauge Height
        unit:
          label: feet
          symbol: ft

  - id: wwa
    title: Weather Watches and Warnings
    description: NWS Weather Watches and Warnings from CAP (Common Alerting Protocol) alerts
    keywords:
      - weather
      - warnings
      - watches
      - alerts
      - CAP
      - real-time
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/wwa
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names:
      CAP_info_event:
        type: Parameter
        id: CAP_info_event
        description: Event type (e.g., Tornado Warning, Flood Watch)
        observedProperty:
          id: event_type
          label: Event Type
        unit:
          label: category
          symbol: category
      CAP_info_severity:
        type: Parameter
        id: CAP_info_severity
        description: Severity level (Extreme, Severe, Moderate, Minor, Unknown)
        observedProperty:
          id: severity
          label: Severity
        unit:
          label: category
          symbol: category
      CAP_info_urgency:
        type: Parameter
        id: CAP_info_urgency
        description: Urgency level (Immediate, Expected, Future, Past, Unknown)
        observedProperty:
          id: urgency
          label: Urgency
        unit:
          label: category
          symbol: category
      CAP_status:
        type: Parameter
        id: CAP_status
        description: Alert status (Actual, Exercise, System, Test, Draft)
        observedProperty:
          id: status
          label: Status
        unit:
          label: category
          symbol: category

  - id: cwa
    title: NWS County Warning Areas
    description: Geographic boundaries of NWS County Warning Areas (CWA) in WKT format
    keywords:
      - NWS
      - CWA
      - boundaries
      - geographic
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/cwa
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names: {}

  - id: states
    title: States
    description: Geographic boundaries of states within the United States
    keywords:
      - NWS
      - states
      - boundaries
      - geographic
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/states
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names: {}

pubsub:
  broker_host: edr-api-desi-c.mdl.nws.noaa.gov
  broker_port: 5672
  protocol: amqp
  collections:
    - water_gauge
    - wwa
  servers:
    - name: amqp_websocket_local
      description: AMQP WebSocket endpoint (local development)
      host: 205.156.8.80
      port: 15670
      protocol: ws
    - name: amqp_websocket_secure
      description: AMQP WebSocket endpoint (production)
      host: edr-api-c.mdl.nws.noaa.gov
      protocol: wss
      pathname: /wifs_wss/
  collection_filters:
    water_gauge:
      filters:
        - name: flood_stages
          description: Alert for selected flood stages (below_action, action, minor, moderate, major)
          type: array
        - name: stations
          description: Comma-separated station IDs or 'all' for all stations
          type: string
        - name: wfo
          description: Weather Forecast Office codes (e.g., PHI, AKQ, OKX)
          type: string
        - name: email
          description: Email address for notifications
          type: string
    wwa:
      filters:
        - name: event_types
          description: Weather event types to subscribe to (e.g., Tornado Warning, Flood Watch)
          type: array
        - name: state
          description: Filter by state, or leave blank for all states
          type: string
        - name: cwa
          description: Filter by County Warning Area code
          type: string
        - name: email
          description: Email address for notifications
          type: string

# OGC API - EDR Part 3 compliance fields
required_conformance_classes:
  - "http://www.opengis.net/spec/ogcapi-edr-1/1.0/conf/core"
  - "http://www.opengis.net/spec/ogcapi-edr-2/1.0/conf/pubsub"

extent_requirements:
  minimum_bbox: [-180, -90, 180, 90]
  allowed_crs:
    - "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
  allowed_trs:
    - "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"

output_formats:
  - name: GeoJSON
    media_type: application/geo+json
    schema_ref: https://geojson.org/schema/FeatureCollection.json

requirements:
  - id: water-gauge-geojson
    statement: The water_gauge collection SHALL return GeoJSON features.
    parts:
      - The service SHALL provide a /collections/water_gauge/items endpoint.
      - The response Content-Type SHALL be application/geo+json.
      - Each feature SHALL include flood_stage, feet_above_stage, and value properties.
  
  - id: pubsub-amqp
    statement: The service SHALL support AMQP pub/sub for real-time notifications.
    parts:
      - The service SHALL provide an AMQP broker at port 5672.
      - Clients SHALL be able to subscribe to collections/water_gauge/items channel.
      - Notifications SHALL be published as GeoJSON features.

abstract_tests:
  - id: water-gauge-geojson
    requirement_id: water-gauge-geojson
    steps:
      - Send GET request to /collections/water_gauge/items.
      - Verify the response Content-Type is application/geo+json.
      - Verify each feature contains flood_stage, feet_above_stage, and value properties.
      - Verify geometry is a valid GeoJSON Point.
  
  - id: pubsub-amqp
    requirement_id: pubsub-amqp
    steps:
      - Connect to AMQP broker at edr-api-desi-c.mdl.nws.noaa.gov:5672.
      - Subscribe to collections/water_gauge/items channel.
      - Verify notifications are received as GeoJSON features.
      - Verify each notification contains required properties.

