components:
  parameters:
    f:
      name: f
      in: query
      required: false
      description: The optional f parameter indicates the output format which the
        server shall provide as part of the response document. The default format
        is GeoJSON.
      schema:
        type: string
        default: json
        enum:
        - json
        - html
        - jsonld
      style: form
      explode: false
    lang:
      name: lang
      in: query
      required: false
      description: The optional lang parameter instructs the server return a response
        in a certain language, if supported.
      schema:
        type: string
        default: en-US
        enum:
        - en-US
  responses:
    '200':
      description: Successful operation
      content:
        application/json:
          schema:
            type: object
    '204':
      description: No content
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            type: object
