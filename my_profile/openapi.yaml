paths:
  /:
    get:
      summary: Landing page
      description: Landing page
      operationId: getLandingPage
      tags:
      - server
      parameters:
      - &id002
        $ref: '#/components/parameters/f'
      - &id003
        $ref: '#/components/parameters/lang'
      responses:
        '200': &id004
          description: Landing page / conformance / collections list
          content:
            application/json:
              schema:
                type: object
                properties:
                  links: &id007
                    type: array
                    items:
                      type: object
                      required:
                      - href
                      - rel
                      properties:
                        href:
                          type: string
                        rel:
                          type: string
                        type:
                          type: string
                        title:
                          type: string
        '400': &id005
          description: Invalid or missing parameter
          content:
            application/json:
              schema: &id001
                type: object
                properties:
                  code:
                    type: string
                  description:
                    type: string
        '500': &id006
          description: Server error
          content:
            application/json:
              schema: *id001
  /conformance:
    get:
      summary: API conformance definition
      description: API conformance definition
      operationId: getConformanceDeclaration
      tags:
      - server
      parameters:
      - *id002
      - *id003
      responses:
